<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <!-- Background -->
  <rect width="390" height="844" fill="#FFFFFF"/>

  <!-- Status Bar -->
  <text x="36" y="40" font-family="-apple-system,SF Pro Display,sans-serif" font-size="15" font-weight="700" fill="#1F2937">9:41</text>
  <rect x="346" y="30" width="22" height="12" rx="3" fill="none" stroke="#1F2937" stroke-width="1.5"/>
  <rect x="348" y="32" width="14" height="8" rx="2" fill="#1F2937"/>

  <!-- Header -->
  <path d="M30 76 L18 76" stroke="#1F2937" stroke-width="2" stroke-linecap="round"/>
  <path d="M22 71 L17 76 L22 81" stroke="#1F2937" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="195" y="82" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="18" font-weight="600" fill="#1F2937" text-anchor="middle">할 일 상세</text>

  <!-- Title + Priority Badge -->
  <text x="24" y="138" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="22" font-weight="700" fill="#1F2937">프로젝트 회의 준비</text>
  <!-- Badge: 높음 -->
  <rect x="312" y="120" width="54" height="28" rx="14" fill="#FEF2F2"/>
  <text x="339" y="140" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="12" font-weight="600" fill="#EF4444" text-anchor="middle">높음</text>

  <!-- Divider -->
  <line x1="24" y1="162" x2="366" y2="162" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Info Row: 마감일 -->
  <rect x="34" y="178" width="18" height="16" rx="2" fill="none" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="34" y1="183" x2="52" y2="183" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="40" y1="175" x2="40" y2="180" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="46" y1="175" x2="46" y2="180" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
  <text x="64" y="192" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="14" fill="#6B7280">마감일</text>
  <text x="130" y="192" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="14" font-weight="500" fill="#1F2937">2026.03.10 18:00</text>

  <!-- Info Row: 생성일 -->
  <circle cx="43" cy="222" r="8" fill="none" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="43" y1="218" x2="43" y2="222" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="43" y1="222" x2="46" y2="225" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
  <text x="64" y="228" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="14" fill="#6B7280">생성일</text>
  <text x="130" y="228" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="14" font-weight="500" fill="#1F2937">2026.03.05 09:30</text>

  <!-- Divider -->
  <line x1="24" y1="252" x2="366" y2="252" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Memo Section -->
  <rect x="24" y="272" width="342" height="160" rx="12" fill="#F8FAFC"/>
  <rect x="24" y="272" width="342" height="160" rx="12" fill="none" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Memo icon & label -->
  <text x="42" y="302" font-family="-apple-system,SF Pro Display,sans-serif" font-size="16">&#128221;</text>
  <text x="62" y="302" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="14" font-weight="600" fill="#6B7280">메모</text>
  <!-- Memo content -->
  <text x="42" y="336" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="15" fill="#1F2937" line-height="24">
    <tspan x="42" dy="0">Figma로 만든 시안 피드백을</tspan>
    <tspan x="42" dy="24">발표 자료에 포함시키면 좋을 듯.</tspan>
  </text>

  <!-- Button Row: 수정 + 삭제 -->
  <!-- Outline: 수정 -->
  <rect x="24" y="692" width="165" height="48" rx="8" fill="white" stroke="#2563EB" stroke-width="1.5"/>
  <text x="106" y="722" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="16" font-weight="600" fill="#2563EB" text-anchor="middle">수정</text>
  <!-- Danger: 삭제 -->
  <rect x="201" y="692" width="165" height="48" rx="8" fill="#EF4444"/>
  <text x="283" y="722" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">삭제</text>

  <!-- Primary: 할 일 완료 -->
  <rect x="24" y="752" width="342" height="48" rx="8" fill="#2563EB"/>
  <text x="195" y="782" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">할 일 완료</text>

  <!-- Home Indicator -->
  <rect x="127" y="826" width="136" height="5" rx="2.5" fill="#1F2937" opacity="0.2"/>
</svg>
