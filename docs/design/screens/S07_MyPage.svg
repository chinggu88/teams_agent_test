<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <!-- Background -->
  <rect width="390" height="844" fill="#FFFFFF"/>

  <!-- Status Bar -->
  <text x="36" y="40" font-family="-apple-system,SF Pro Display,sans-serif" font-size="15" font-weight="700" fill="#1F2937">9:41</text>
  <rect x="346" y="30" width="22" height="12" rx="3" fill="none" stroke="#1F2937" stroke-width="1.5"/>
  <rect x="348" y="32" width="14" height="8" rx="2" fill="#1F2937"/>

  <!-- Header -->
  <text x="195" y="82" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="18" font-weight="600" fill="#1F2937" text-anchor="middle">마이페이지</text>

  <!-- Profile Section -->
  <!-- Avatar circle -->
  <circle cx="195" cy="160" r="40" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
  <!-- User icon in avatar -->
  <circle cx="195" cy="152" r="10" fill="none" stroke="#9CA3AF" stroke-width="2"/>
  <path d="M178 178 C178 170 185 164 195 164 C205 164 212 170 212 178" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Nickname -->
  <text x="195" y="228" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="20" font-weight="600" fill="#1F2937" text-anchor="middle">홍길동</text>
  <!-- Email -->
  <text x="195" y="250" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="14" fill="#6B7280" text-anchor="middle">hong@example.com</text>

  <!-- Divider (thick) -->
  <rect x="0" y="276" width="390" height="8" fill="#F8FAFC"/>

  <!-- Settings List -->
  <!-- 알림 설정 -->
  <text x="24" y="316" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="16" fill="#1F2937">알림 설정</text>
  <!-- Switch ON -->
  <rect x="318" y="300" width="48" height="28" rx="14" fill="#2563EB"/>
  <circle cx="343" cy="314" r="11" fill="white"/>
  <line x1="24" y1="340" x2="366" y2="340" stroke="#E2E8F0" stroke-width="1"/>

  <!-- 테마 -->
  <text x="24" y="372" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="16" fill="#1F2937">테마</text>
  <text x="360" y="372" font-family="-apple-system,SF Pro Display,sans-serif" font-size="20" fill="#9CA3AF" text-anchor="end">&#8250;</text>
  <line x1="24" y1="396" x2="366" y2="396" stroke="#E2E8F0" stroke-width="1"/>

  <!-- 비밀번호 변경 -->
  <text x="24" y="428" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="16" fill="#1F2937">비밀번호 변경</text>
  <text x="360" y="428" font-family="-apple-system,SF Pro Display,sans-serif" font-size="20" fill="#9CA3AF" text-anchor="end">&#8250;</text>
  <line x1="24" y1="452" x2="366" y2="452" stroke="#E2E8F0" stroke-width="1"/>

  <!-- 로그아웃 (in list) -->
  <text x="24" y="484" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="16" fill="#1F2937">로그아웃</text>
  <text x="360" y="484" font-family="-apple-system,SF Pro Display,sans-serif" font-size="20" fill="#9CA3AF" text-anchor="end">&#8250;</text>

  <!-- Divider (thick) -->
  <rect x="0" y="512" width="390" height="8" fill="#F8FAFC"/>

  <!-- Logout Button -->
  <rect x="24" y="544" width="342" height="48" rx="8" fill="white" stroke="#EF4444" stroke-width="1.5"/>
  <text x="195" y="574" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="16" font-weight="600" fill="#EF4444" text-anchor="middle">로그아웃</text>

  <!-- Bottom Nav Background -->
  <rect x="0" y="760" width="390" height="84" fill="#FFFFFF"/>
  <line x1="0" y1="760" x2="390" y2="760" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Bottom Nav: Home -->
  <text x="49" y="788" font-family="-apple-system,SF Pro Display,sans-serif" font-size="20" fill="#9CA3AF" text-anchor="middle">&#8962;</text>
  <text x="49" y="804" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="11" fill="#9CA3AF" text-anchor="middle">홈</text>

  <!-- Bottom Nav: Search -->
  <circle cx="146" cy="782" r="8" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="152" y1="788" x2="156" y2="792" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round"/>
  <text x="146" y="804" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="11" fill="#9CA3AF" text-anchor="middle">검색</text>

  <!-- Bottom Nav: Completed -->
  <circle cx="244" cy="782" r="7" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
  <path d="M240 782 L243 785 L248 780" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="244" y="804" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="11" fill="#9CA3AF" text-anchor="middle">완료</text>

  <!-- Bottom Nav: My (active) -->
  <circle cx="341" cy="780" r="6" fill="none" stroke="#2563EB" stroke-width="1.5"/>
  <path d="M334 792 C334 788 337 786 341 786 C345 786 348 788 348 792" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <text x="341" y="804" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="11" fill="#2563EB" text-anchor="middle">마이</text>

  <!-- Home Indicator -->
  <rect x="127" y="826" width="136" height="5" rx="2.5" fill="#1F2937" opacity="0.2"/>
</svg>
