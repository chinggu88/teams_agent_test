<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <!-- Background -->
  <rect width="390" height="844" fill="#FFFFFF"/>

  <!-- Status Bar -->
  <text x="36" y="40" font-family="-apple-system,SF Pro Display,sans-serif" font-size="15" font-weight="700" fill="#1F2937">9:41</text>
  <rect x="346" y="30" width="22" height="12" rx="3" fill="none" stroke="#1F2937" stroke-width="1.5"/>
  <rect x="348" y="32" width="14" height="8" rx="2" fill="#1F2937"/>

  <!-- Header -->
  <!-- Back arrow -->
  <path d="M30 76 L18 76" stroke="#1F2937" stroke-width="2" stroke-linecap="round"/>
  <path d="M22 71 L17 76 L22 81" stroke="#1F2937" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="195" y="82" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="18" font-weight="600" fill="#1F2937" text-anchor="middle">할 일 추가</text>

  <!-- Title Input -->
  <text x="24" y="134" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="14" font-weight="600" fill="#1F2937">제목 <tspan fill="#EF4444">*</tspan></text>
  <rect x="24" y="144" width="342" height="48" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="174" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="15" fill="#9CA3AF">할 일을 입력하세요</text>

  <!-- Memo TextArea -->
  <text x="24" y="224" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="14" font-weight="600" fill="#1F2937">메모</text>
  <rect x="24" y="234" width="342" height="100" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="260" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="15" fill="#9CA3AF">상세 내용을 입력하세요</text>

  <!-- Date Picker -->
  <text x="24" y="366" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="14" font-weight="600" fill="#1F2937">마감일</text>
  <rect x="24" y="376" width="342" height="48" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <!-- Calendar icon -->
  <rect x="38" y="390" width="18" height="16" rx="2" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="38" y1="395" x2="56" y2="395" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="44" y1="387" x2="44" y2="392" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="52" y1="387" x2="52" y2="392" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round"/>
  <text x="66" y="406" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="15" fill="#9CA3AF">날짜 선택</text>

  <!-- Priority Chips -->
  <text x="24" y="456" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="14" font-weight="600" fill="#1F2937">우선순위</text>
  <!-- Chip: 높음 -->
  <rect x="24" y="466" width="72" height="36" rx="18" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="60" y="490" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="14" font-weight="500" fill="#6B7280" text-anchor="middle">높음</text>
  <!-- Chip: 보통 (selected) -->
  <rect x="104" y="466" width="72" height="36" rx="18" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="140" y="490" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="14" font-weight="500" fill="#F59E0B" text-anchor="middle">보통</text>
  <!-- Chip: 낮음 -->
  <rect x="184" y="466" width="72" height="36" rx="18" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="220" y="490" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="14" font-weight="500" fill="#6B7280" text-anchor="middle">낮음</text>

  <!-- Tag Chips -->
  <text x="24" y="536" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="14" font-weight="600" fill="#1F2937">태그</text>
  <!-- Chip: 업무 (selected) -->
  <rect x="24" y="546" width="64" height="36" rx="18" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="56" y="570" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="14" font-weight="500" fill="#2563EB" text-anchor="middle">업무</text>
  <!-- Chip: 개인 -->
  <rect x="96" y="546" width="64" height="36" rx="18" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="128" y="570" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="14" font-weight="500" fill="#6B7280" text-anchor="middle">개인</text>
  <!-- Chip: 학습 -->
  <rect x="168" y="546" width="64" height="36" rx="18" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="200" y="570" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="14" font-weight="500" fill="#6B7280" text-anchor="middle">학습</text>
  <!-- Chip: + 추가 -->
  <rect x="240" y="546" width="72" height="36" rx="18" fill="white" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="276" y="570" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="14" font-weight="500" fill="#6B7280" text-anchor="middle">+ 추가</text>

  <!-- Save Button -->
  <rect x="24" y="760" width="342" height="48" rx="8" fill="#2563EB"/>
  <text x="195" y="790" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">저장하기</text>

  <!-- Home Indicator -->
  <rect x="127" y="826" width="136" height="5" rx="2.5" fill="#1F2937" opacity="0.2"/>
</svg>
