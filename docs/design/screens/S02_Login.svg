<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <linearGradient id="logoBg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="#FFFFFF"/>

  <!-- Status Bar -->
  <text x="36" y="40" font-family="-apple-system,SF Pro Display,sans-serif" font-size="15" font-weight="700" fill="#1F2937">9:41</text>
  <rect x="346" y="30" width="22" height="12" rx="3" fill="none" stroke="#1F2937" stroke-width="1.5"/>
  <rect x="348" y="32" width="14" height="8" rx="2" fill="#1F2937"/>

  <!-- Header -->
  <text x="195" y="82" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="18" font-weight="600" fill="#1F2937" text-anchor="middle">로그인</text>

  <!-- App Logo -->
  <rect x="159" y="120" width="72" height="72" rx="16" fill="url(#logoBg2)"/>
  <rect x="175" y="132" width="40" height="48" rx="4" fill="white" opacity="0.9"/>
  <line x1="183" y1="148" x2="207" y2="148" stroke="#2563EB" stroke-width="2" stroke-linecap="round"/>
  <line x1="183" y1="158" x2="201" y2="158" stroke="#2563EB" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <circle cx="183" cy="148" r="3" fill="#22C55E"/>

  <!-- Email Input -->
  <text x="24" y="228" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="14" font-weight="600" fill="#1F2937">이메일</text>
  <rect x="24" y="238" width="342" height="48" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="268" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="15" fill="#9CA3AF">example@email.com</text>

  <!-- Password Input -->
  <text x="24" y="314" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="14" font-weight="600" fill="#1F2937">비밀번호</text>
  <rect x="24" y="324" width="342" height="48" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="354" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="20" fill="#9CA3AF" letter-spacing="4">........</text>
  <!-- Eye icon -->
  <circle cx="346" cy="348" r="8" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
  <circle cx="346" cy="348" r="3" fill="#9CA3AF"/>

  <!-- Login Button -->
  <rect x="24" y="400" width="342" height="48" rx="8" fill="#2563EB"/>
  <text x="195" y="430" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">로그인</text>

  <!-- Divider "또는" -->
  <line x1="24" y1="476" x2="162" y2="476" stroke="#E2E8F0" stroke-width="1"/>
  <text x="195" y="480" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="13" fill="#9CA3AF" text-anchor="middle">또는</text>
  <line x1="228" y1="476" x2="366" y2="476" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Google Button -->
  <rect x="24" y="504" width="342" height="48" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <!-- Google G icon (simplified) -->
  <circle cx="155" cy="528" r="9" fill="none" stroke="#4285F4" stroke-width="2"/>
  <line x1="161" y1="534" x2="164" y2="537" stroke="#4285F4" stroke-width="2" stroke-linecap="round"/>
  <text x="210" y="534" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="15" font-weight="500" fill="#1F2937" text-anchor="middle">Google로 계속하기</text>

  <!-- Apple Button -->
  <rect x="24" y="564" width="342" height="48" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <!-- Apple icon (simplified) -->
  <path d="M153 582 C153 578 157 575 157 575 C157 575 155 572 155 570 C155 568 157 566 159 566 C161 566 162 567 163 568 C164 567 165 566 167 566 C169 566 171 568 171 570 C171 572 169 575 169 575 C169 575 173 578 173 582 C173 587 169 590 163 590 C157 590 153 587 153 582 Z" fill="#1F2937"/>
  <text x="210" y="594" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="15" font-weight="500" fill="#1F2937" text-anchor="middle">Apple로 계속하기</text>

  <!-- Sign up link -->
  <text x="195" y="650" font-family="-apple-system,Pretendard,SF Pro Display,sans-serif" font-size="14" fill="#6B7280" text-anchor="middle">
    <tspan>아직 회원이 아니신가요? </tspan>
    <tspan fill="#2563EB" font-weight="600">회원가입</tspan>
  </text>

  <!-- Home Indicator -->
  <rect x="127" y="826" width="136" height="5" rx="2.5" fill="#1F2937" opacity="0.2"/>
</svg>
